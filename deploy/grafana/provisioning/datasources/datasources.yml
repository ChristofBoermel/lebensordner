apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Backward-compatible UID for previously created alert rules.
  # Some persisted Grafana resources may still reference "prometheus-1".
  - name: Prometheus Legacy
    uid: prometheus-1
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
